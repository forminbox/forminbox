name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  php:
    name: PHP ${{ matrix.php }} — lint, static analysis, unit tests
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.1', '8.3']
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none

      - name: Validate composer.json
        run: composer validate --strict

      - name: Install Composer dependencies
        uses: ramsey/composer-install@v3

      - name: PHPCS
        run: composer lint

      - name: PHPStan
        run: composer stan

      - name: Unit tests
        run: composer test:unit

  js:
    name: JS — typecheck, lint, build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint:js

      - name: Build
        run: npm run build

      - name: Ensure both bundles were produced
        run: test -f build/admin.js && test -f build/admin.asset.php && test -f build/public-form.js

      # Guardrails from MILESTONES M1.5: the design system is bundled, so keep
      # the admin bundle honest, and the public bundle must stay framework-free.
      - name: Enforce bundle size budgets
        run: |
          admin_js=$(wc -c < build/admin.js)
          admin_css=$(wc -c < build/admin.css)
          public_js=$(wc -c < build/public-form.js)
          echo "admin.js=${admin_js}B admin.css=${admin_css}B public-form.js=${public_js}B"
          test "$admin_js" -le 179200 || { echo "admin.js exceeds 175 KB"; exit 1; }
          test "$admin_css" -le 51200 || { echo "admin.css exceeds 50 KB"; exit 1; }
          test "$public_js" -le 5120 || { echo "public-form.js exceeds 5 KB"; exit 1; }

  integration:
    name: Integration — WordPress test suite (wp-env)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          coverage: none

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Composer dependencies
        uses: ramsey/composer-install@v3

      - name: Install npm dependencies
        run: npm ci

      - name: Start wp-env
        run: npx wp-env start

      - name: Run integration tests
        run: npm run test:php
